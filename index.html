
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Spark AI</title>
      <link rel="icon" type="image/gif" href="/spark-logo.gif" />
      <link rel="shortcut icon" href="/spark-logo.gif" />
      <script>
        (function() {
          var t = localStorage.getItem('theme');
          // If user has explicitly chosen dark, or explicitly chosen 'system' + system is dark → dark
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
          // No saved preference → light (landing page default)
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
