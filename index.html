
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack) — overwritten by JS for individual posts -->
      <meta property="og:type" content="website" />
      <meta property="og:site_name" content="Spark AI" />
      <meta property="og:title" content="Spark AI — AI-powered price intelligence for UAE retailers" />
      <meta property="og:description" content="Track competitor prices automatically across Amazon AE, Noon, Carrefour and 10+ UAE retailers. Vision AI does the reading." />
      <meta property="og:image" content="/spark-logo.gif" />

      <!-- Twitter card — overwritten by JS for individual posts -->
      <meta name="twitter:card" content="summary_large_image" />

      <meta name="twitter:description" content="Track competitor prices automatically across UAE retailers. Vision AI does the reading." />

      <link rel="icon" type="image/gif" href="/spark-logo.gif" sizes="32x32" />
      <link rel="icon" type="image/gif" href="/spark-logo.gif" sizes="16x16" />

      <link rel="apple-touch-icon" href="/spark-logo.gif" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <script>
        (function() {
          var t = localStorage.getItem('theme');
          // If user has explicitly chosen dark, or explicitly chosen 'system' + system is dark → dark
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
          // No saved preference → light (landing page default)
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
